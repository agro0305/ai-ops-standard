name: Feature request
description: Propose an implementation, tooling or documentation improvement
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What operational problem or limitation should be solved?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the desired behavior and interface.
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Safety and audit impact
      description: Explain effects on dry-run, approval, backup, rollback, secrets and audit records.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: List observable requirements and tests.
    validations:
      required: true
