name: Validate AI-OPS repository

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test runner
        run: python -m pip install --disable-pip-version-check pytest

      - name: Validate specifications and schemas
        run: python scripts/validate_repository.py

      - name: Compile Python sources
        run: python -m compileall -q implementations scripts compliance/tests dashboard

      - name: Validate shell scripts
        run: |
          bash -n dashboard/install_systemd.sh
          bash -n dashboard/install_refresh_timer.sh
          bash -n dashboard/install_retention_timer.sh
          bash -n dashboard/install_incident_timer.sh
          bash -n dashboard/install_notification_timer.sh

      - name: Run compliance tests
        run: python -m pytest -q compliance/tests

      - name: Smoke-test discovery CLI
        run: |
          python implementations/discovery/aiops_discovery.py \
            --collect development \
            --compact \
            --output /tmp/discovery-report.json
          python -m json.tool /tmp/discovery-report.json >/dev/null

      - name: Smoke-test planning and dry-run execution
        run: |
          python implementations/operations/aiops_operations.py plan \
            --discovery /tmp/discovery-report.json \
            --request examples/operation-request.json \
            --output /tmp/operation-plan.json
          python implementations/operations/aiops_operations.py execute \
            --plan /tmp/operation-plan.json \
            --output /tmp/execution-report.json
          python -m json.tool /tmp/operation-plan.json >/dev/null
          python -m json.tool /tmp/execution-report.json >/dev/null

      - name: Smoke-test atomic report refresh
        run: |
          mkdir -p /tmp/aiops-reports
          python scripts/refresh_reports.py \
            --project-root . \
            --output-dir /tmp/aiops-reports
          python -m json.tool /tmp/aiops-reports/refresh-status.json >/dev/null

      - name: Smoke-test incident synchronization
        run: |
          python implementations/incidents/aiops_incidents.py \
            --root /tmp/aiops-reports \
            sync \
            --actor github-actions \
            --apply
          python -m json.tool /tmp/aiops-reports/incident-status.json >/dev/null

      - name: Smoke-test incident-aware notification dry-run
        run: |
          python scripts/notify_incident_alerts.py \
            --root /tmp/aiops-reports \
            --config examples/notifications.json
          python -m json.tool /tmp/aiops-reports/notification-status.json >/dev/null

      - name: Smoke-test retention dry-run
        run: |
          python scripts/retention.py \
            --root /tmp/aiops-reports \
            --backup-days 30 \
            --audit-days 90 \
            --output /tmp/retention-plan.json
          python -m json.tool /tmp/retention-plan.json >/dev/null
