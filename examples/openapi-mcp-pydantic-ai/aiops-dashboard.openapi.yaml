openapi: 3.0.3
info:
  title: AI-OPS Dashboard API
  version: 0.1.0

servers:
  - url: http://127.0.0.1:8789

paths:
  /healthz:
    get:
      operationId: getHealth
      summary: Check dashboard health
      responses:
        "200":
          description: Dashboard is healthy
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /readyz:
    get:
      operationId: getReadiness
      summary: Check dashboard readiness
      responses:
        "200":
          description: Dashboard is ready
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
